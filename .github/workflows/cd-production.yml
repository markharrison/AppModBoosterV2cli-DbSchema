name: CD - Production

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Application name prefix'
        required: false
        default: 'expenses'

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: ${{ github.event.inputs.appName || 'expenses' }}
  ENVIRONMENT: production
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: output/Src

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: output/Src

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~Expenses.Api.Tests"
        working-directory: output/Src

      - name: Publish API App
        run: dotnet publish Expenses.Api/Expenses.Api.csproj --configuration Release --output ${{ github.workspace }}/publish/api --no-build
        working-directory: output/Src

      - name: Publish Web App
        run: dotnet publish Expenses.Web/Expenses.Web.csproj --configuration Release --output ${{ github.workspace }}/publish/web --no-build
        working-directory: output/Src

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: publish/api

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: publish/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: Production

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-app
          path: api-app

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: web-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Package API App
        run: |
          cd api-app
          zip -r ../api-app.zip .

      - name: Package Web App
        run: |
          cd web-app
          zip -r ../web-app.zip .

      - name: Deploy API App
        run: |
          az webapp deploy \
            --name "app-${{ env.APP_NAME }}-api-${{ env.ENVIRONMENT }}" \
            --resource-group "rg-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}" \
            --src-path api-app.zip \
            --type zip

      - name: Deploy Web App
        run: |
          az webapp deploy \
            --name "app-${{ env.APP_NAME }}-web-${{ env.ENVIRONMENT }}" \
            --resource-group "rg-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}" \
            --src-path web-app.zip \
            --type zip

      - name: Verify API liveness
        run: |
          echo "Waiting for API to start..."
          sleep 30
          curl --fail --retry 5 --retry-delay 10 \
            "https://app-${{ env.APP_NAME }}-api-${{ env.ENVIRONMENT }}.azurewebsites.net/live" \
            || echo "::warning::API /live endpoint check failed"
