name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: output/Src

      - name: Build
        run: dotnet build --no-restore
        working-directory: output/Src

      - name: Run unit tests
        run: dotnet test --no-build --verbosity normal --filter "FullyQualifiedName~Expenses.Api.Tests"
        working-directory: output/Src
